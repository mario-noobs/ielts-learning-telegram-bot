services:
  - type: web
    name: ielts-bot-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /api/v1/health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DB_POOL_SIZE
        value: "3"
      - key: DEFAULT_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: BOT_USERNAME
        sync: false
