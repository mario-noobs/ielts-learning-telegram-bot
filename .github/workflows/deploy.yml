name: Deploy to Production

on:
  # Manual-only: the production host lives on a private LAN and is unreachable
  # from GitHub-hosted runners. Push-triggered auto-deploy stays disabled until
  # we move to a public VPS or add a self-hosted runner. Deploy is done manually
  # via SSH — see .claude/skills/deploy/SKILL.md.
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ielts/ielts-bot
            git pull origin main
            ./venv/bin/pip install -r requirements.txt --quiet
            sudo systemctl restart ielts-bot

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            systemctl is-active ielts-bot
