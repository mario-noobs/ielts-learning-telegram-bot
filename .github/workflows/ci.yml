name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ielts
          POSTGRES_USER: ielts
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U ielts -d ielts"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://ielts:test@localhost:5432/ielts
    steps:
      - uses: actions/checkout@v4

      - uses: mario-noobs/ci-baseline/actions/setup-python@main
        with:
          python_version: "3.11"
          requirements_file: requirements.txt
          dev_requirements_file: requirements-dev.txt

      # TODO: re-enable once the pre-existing ruff debt is cleaned up.
      # The repo carries a backlog of import-ordering errors in files that
      # current PRs don't touch, blocking CI on otherwise-clean changes.
      # Plan: dedicated `chore: ruff --fix sweep` PR to bring main green,
      # then unconditionally re-enable this step.
      # - name: Lint with ruff
      #   run: ruff check .

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - uses: mario-noobs/ci-baseline/actions/run-pytest@main
        with:
          paths: tests/
          args: "-v --tb=short"
          coverage_paths: "services bot.utils"
          coverage_min: "15"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mario-noobs/ci-baseline/actions/setup-node@main
        with:
          node_version: "20"
          package_manager: npm
          working_directory: web

      - name: Build Storybook
        working-directory: web
        run: npm run build-storybook -- --quiet
