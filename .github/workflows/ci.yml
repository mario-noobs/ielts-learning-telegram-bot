name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
    # 'synchronize' is intentionally omitted — push to the PR branch already
    # triggers CI via the push event above, so adding synchronize would cause
    # duplicate runs. We only want PR-lifecycle events that aren't pushes.
    types: [opened, reopened, ready_for_review]

# Dedupe by branch so a new push cancels its in-flight predecessor.
# For pull_request events use the head ref so the group matches the push side.
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ielts
          POSTGRES_USER: ielts
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U ielts -d ielts"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://ielts:test@localhost:5432/ielts
    steps:
      - uses: actions/checkout@v4

      - uses: mario-noobs/ci-baseline/actions/setup-python@main
        with:
          python_version: "3.11"
          requirements_file: requirements.txt
          dev_requirements_file: requirements-dev.txt

      # TODO: re-enable once the pre-existing ruff debt is cleaned up.
      # - name: Lint with ruff
      #   run: ruff check .

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - uses: mario-noobs/ci-baseline/actions/run-pytest@main
        with:
          paths: tests/
          args: "-v --tb=short"
          coverage_paths: "services bot.utils"
          coverage_min: "15"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mario-noobs/ci-baseline/actions/setup-node@main
        with:
          node_version: "20"
          package_manager: npm
          working_directory: web

      - name: Build Storybook
        working-directory: web
        run: npm run build-storybook -- --quiet

  notify:
    needs: [lint-and-test, web]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read
    steps:
      - name: Decide context and whether to notify
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINT_RESULT: ${{ needs.lint-and-test.result }}
          WEB_RESULT: ${{ needs.web.result }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Overall conclusion across required jobs.
          if [ "$LINT_RESULT" = "success" ] && [ "$WEB_RESULT" = "success" ]; then
            overall=success
          else
            overall=failure
          fi

          # Classify the push:
          #   main      → notify on failure / back-to-green on main
          #   pr        → push to a branch with an open PR to main; same logic, PR context
          #   branch    → push to a feature branch with no open PR yet; silent
          if [ "$BRANCH" = "main" ]; then
            context=main
            label="main"
            link="$GITHUB_SERVER_URL/$REPO/commits/main"
          else
            pr_json=$(gh pr list --repo "$REPO" --head "$BRANCH" --base main --state open --json number,title,url --limit 1)
            pr_count=$(echo "$pr_json" | jq 'length')
            if [ "$pr_count" -gt 0 ]; then
              context=pr
              pr_number=$(echo "$pr_json" | jq -r '.[0].number')
              pr_title=$(echo "$pr_json"  | jq -r '.[0].title')
              pr_url=$(echo "$pr_json"    | jq -r '.[0].url')
              label="PR #${pr_number} — ${pr_title}"
              link="$pr_url"
            else
              context=branch
            fi
          fi

          # Most recent CI run on the same branch with a *meaningful* outcome —
          # skip the current run and any cancelled/skipped runs (e.g., concurrency
          # cancellations), so back-to-green still fires when the prior real run
          # was a failure even if cancellations happened in between.
          prev=$(gh api \
            "repos/${REPO}/actions/workflows/ci.yml/runs?branch=${BRANCH}&status=completed&per_page=20" \
            -q "[.workflow_runs[] | select(.id != ${GITHUB_RUN_ID}) | select(.conclusion == \"success\" or .conclusion == \"failure\")][0].conclusion")
          echo "context=$context, overall=$overall, prev=${prev:-none}"

          notify=false
          if [ "$context" = "branch" ]; then
            # Pre-PR feature-branch pushes: stay quiet.
            notify=false
          elif [ "$overall" = "failure" ]; then
            notify=true
            title=":x: CI failed on ${label}"
            color="#dc2626"
          elif [ "$overall" = "success" ] && [ "$prev" = "failure" ]; then
            notify=true
            title=":white_check_mark: CI back to green on ${label}"
            color="#16a34a"
          fi

          {
            echo "notify=$notify"
            echo "title=$title"
            echo "color=$color"
            echo "link=$link"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Pumble
        if: steps.decide.outputs.notify == 'true'
        env:
          WEBHOOK: ${{ secrets.PUMBLE_WEBHOOK_URL }}
          TITLE: ${{ steps.decide.outputs.title }}
          COLOR: ${{ steps.decide.outputs.color }}
          LINK: ${{ steps.decide.outputs.link }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          LINT_RESULT: ${{ needs.lint-and-test.result }}
          WEB_RESULT: ${{ needs.web.result }}
        run: |
          payload=$(jq -n \
            --arg title  "$TITLE" \
            --arg color  "$COLOR" \
            --arg link   "$LINK" \
            --arg commit "<$SERVER/$REPO/commit/$COMMIT_SHA|${COMMIT_SHA:0:7}> by $ACTOR" \
            --arg msg    "$COMMIT_MSG" \
            --arg jobs   "lint-and-test: $LINT_RESULT · web: $WEB_RESULT" \
            --arg run    "<$SERVER/$REPO/actions/runs/$RUN_ID|View run>" \
            '{
              text: $title,
              attachments: [{
                color: $color,
                fields: [
                  {title: "Where",   value: $link,   short: false},
                  {title: "Commit",  value: $commit, short: false},
                  {title: "Message", value: $msg,    short: false},
                  {title: "Jobs",    value: $jobs,   short: false},
                  {title: "Run",     value: $run,    short: false}
                ]
              }]
            }')
          curl -fsSL -X POST -H "Content-Type: application/json" --data "$payload" "$WEBHOOK"
