<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none" role="img" aria-label="Track readiness across vocab, writing, listening, reading">
  <rect width="400" height="260" fill="#F8FAFC"/>
  <!-- Top bar -->
  <rect x="16" y="16" width="368" height="32" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="28" y="36" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0D9488">Readiness Track</text>

  <!-- Readiness card -->
  <rect x="16" y="64" width="368" height="180" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="32" y="84" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Sẵn sàng thi chưa?</text>
  <text x="332" y="84" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0D9488" text-anchor="end">68%</text>

  <!-- Overall progress bar -->
  <rect x="32" y="94" width="336" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="32" y="94" width="228" height="8" rx="4" fill="#0D9488"/>

  <!-- Step 1 — done -->
  <circle cx="44" cy="132" r="8" fill="#10B981"/>
  <text x="44" y="136" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="60" y="132" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Từ vựng mục tiêu</text>
  <text x="60" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">300 từ · Hoàn thành</text>

  <!-- Step 2 — done -->
  <circle cx="44" cy="166" r="8" fill="#10B981"/>
  <text x="44" y="170" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="60" y="166" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Writing 5 bài</text>
  <text x="60" y="179" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">Band TB 6.8 · Hoàn thành</text>

  <!-- Step 3 — in progress -->
  <circle cx="44" cy="200" r="8" fill="#0D9488"/>
  <circle cx="44" cy="200" r="4" fill="#FFFFFF"/>
  <text x="60" y="197" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Nghe + Đọc</text>
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Cần hoàn thành 4 bài nữa</text>
  <rect x="220" y="192" width="42" height="18" rx="6" fill="#E0F2FE"/>
  <text x="241" y="205" font-family="system-ui, sans-serif" font-size="8" fill="#0284C7" text-anchor="middle">Nghe</text>
  <rect x="266" y="192" width="36" height="18" rx="6" fill="#F0FDF4"/>
  <text x="284" y="205" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A" text-anchor="middle">Đọc</text>

  <!-- Step 4 — pending -->
  <circle cx="44" cy="232" r="8" fill="none" stroke="#CBD5E1" stroke-width="2"/>
  <text x="60" y="232" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Mock Test đầy đủ</text>
  <text x="60" y="244" font-family="system-ui, sans-serif" font-size="9" fill="#CBD5E1">Mở khóa sau khi hoàn thành bước 3</text>
</svg>
